<!DOCTYPE html>
<html>
<head>
  <title>LeetSync</title>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #060608;
      color: #f8fafc;
      margin: 0;
    }
    h1 {
      font-size: 1.25rem;
      margin-top: 0;
      color: #3b82f6;
    }
    p {
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
      margin-top: 16px;
    }
    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h1>LeetSync</h1>
  <p>Your accepted LeetCode solutions will automatically be pushed to your GitHub repository.</p>
  <a href="http://localhost:3000/login" target="_blank" class="btn">Go to Dashboard</a>
  <script src="popup.js"></script>
</body>
</html>
