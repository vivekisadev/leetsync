<!DOCTYPE html>
<html>
<head>
  <title>Codeship</title>
  <style>
    body {
      width: 280px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #ededed;
      margin: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .icon {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 8px;
      border-radius: 10px;
      display: flex;
    }
    h1 {
      font-size: 1.15rem;
      margin: 0;
      color: #ffffff;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.85rem;
      color: #a1a1aa;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #a1a1aa;
      margin-bottom: 20px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }
    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 10px;
      background: #ededed;
      color: #0a0a0a;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
      text-decoration: none;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: #ffffff;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ededed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
    </div>
    <h1>Codeship</h1>
  </div>
  
  <div class="status">
    <div class="status-dot"></div>
    Listening for submissions
  </div>

  <p>Your accepted solutions are automatically captured and synced to your GitHub repository in the background.</p>
  <div style="margin-bottom: 24px;">
    <label for="postStyle" style="display: block; font-size: 0.75rem; color: #a1a1aa; margin-bottom: 8px; font-weight: 500;">LinkedIn Post Style:</label>
    <select id="postStyle" style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.05); color: #ededed; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.85rem; cursor: pointer; outline: none; box-sizing: border-box; font-family: inherit;">
      <option value="random" style="background: #1a1a1a; color: #ededed;">Random Rotation (Default)</option>
      <option value="0" style="background: #1a1a1a; color: #ededed;">Clean & Professional</option>
      <option value="1" style="background: #1a1a1a; color: #ededed;">Enthusiastic Hacker</option>
      <option value="2" style="background: #1a1a1a; color: #ededed;">Goal Celebration</option>
      <option value="3" style="background: #1a1a1a; color: #ededed;">Brief & Direct</option>
    </select>
  </div>
  
  <a href="https://codeship-bay.vercel.app/dashboard" target="_blank" class="btn" style="margin-bottom: 12px;">View Dashboard</a>
  
  <button id="toggleReportBtn" class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #ededed; margin-bottom: 12px;">Report Issue</button>
  
  <div id="reportFormContainer" style="display: none; flex-direction: column; gap: 8px;">
    <select id="reportType" style="padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem;">
      <option value="bug">Bug</option>
      <option value="feedback">Feedback</option>
    </select>
    <textarea id="reportDesc" placeholder="Description (Optional)" style="padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; resize: none; min-height: 60px; font-family: inherit;"></textarea>
    <button id="submitReportBtn" class="btn" style="background: #10b981; color: white;">Submit with Logs</button>
    <div id="reportStatus" style="font-size: 0.75rem; text-align: center; margin-top: 4px; color: #10b981;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
